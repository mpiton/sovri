# Sovri pnpm workspaces — see docs/adr/002.
# Apache 2.0 packages live in packages/*; runnable surfaces in apps/*
# (apps/community-bot is Apache 2.0; apps/cloud-api is proprietary, v1.0+).
packages:
  - "packages/*"
  - "apps/*"

# pnpm-only settings (kept out of .npmrc so `pnpm exec` does not warn
# via the npm config parser on every run).
autoInstallPeers: true
strictPeerDependencies: true
verifyStoreIntegrity: true
