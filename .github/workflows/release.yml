name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Verify release tag
        run: >-
          node scripts/ci-policy.mjs release-verify-tag
          --tag "${GITHUB_REF_NAME}"
          --package-files
          "packages/core/package.json,packages/review-engine/package.json,packages/llm-providers/package.json,packages/config/package.json,packages/observability/package.json,apps/community-bot/package.json"
          --changelog CHANGELOG.md

  build-and-push:
    runs-on: ubuntu-latest
    needs: verify-tag
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: image-tags
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          minor="${RELEASE_TAG%.*}"
          major="${RELEASE_TAG%%.*}"
          {
            echo "full=${RELEASE_TAG}"
            echo "minor=${minor}"
            echo "major=${major}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Community bot image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/mpiton/sovri/community-bot:${{ steps.image-tags.outputs.full }}
            ghcr.io/mpiton/sovri/community-bot:${{ steps.image-tags.outputs.minor }}
            ghcr.io/mpiton/sovri/community-bot:${{ steps.image-tags.outputs.major }}
            ghcr.io/mpiton/sovri/community-bot:latest
          labels: org.opencontainers.image.source=https://github.com/mpiton/sovri

  sbom:
    runs-on: ubuntu-latest
    needs: verify-tag
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          artifact-name: sbom.cyclonedx.json
          upload-artifact: true
          upload-release-assets: false
          dependency-snapshot: false

  gh-release:
    runs-on: ubuntu-latest
    needs:
      - verify-tag
      - build-and-push
      - sbom
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Download SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: sbom.cyclonedx.json
          path: .

      - name: Extract release notes
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          if [ -z "$version" ]; then
            echo "RELEASE_TAG is required" >&2
            exit 1
          fi
          node scripts/ci-policy.mjs release-extract-notes \
            --changelog CHANGELOG.md \
            --version "$version" \
            --max-bytes 100000 \
            --repo-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" > release-notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          fi
          gh release upload "$GITHUB_REF_NAME" sbom.cyclonedx.json --clobber
