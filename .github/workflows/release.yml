name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"

      - name: Verify release tag
        run: >-
          node scripts/ci-policy.mjs release-verify-tag
          --tag "${GITHUB_REF_NAME}"
          --package-files
          "packages/core/package.json,packages/review-engine/package.json,packages/llm-providers/package.json,packages/config/package.json,packages/observability/package.json,apps/community-bot/package.json"
          --changelog CHANGELOG.md

  build-and-push:
    runs-on: ubuntu-latest
    needs: verify-tag
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: image-tags
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          minor="${RELEASE_TAG%.*}"
          major="${RELEASE_TAG%%.*}"
          {
            echo "full=${RELEASE_TAG}"
            echo "minor=${minor}"
            echo "major=${major}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Community bot image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/mpiton/sovri/community-bot:${{ steps.image-tags.outputs.full }}
            ghcr.io/mpiton/sovri/community-bot:${{ steps.image-tags.outputs.minor }}
            ghcr.io/mpiton/sovri/community-bot:${{ steps.image-tags.outputs.major }}
            ghcr.io/mpiton/sovri/community-bot:latest
          labels: org.opencontainers.image.source=https://github.com/mpiton/sovri

  sbom:
    runs-on: ubuntu-latest
    needs: verify-tag
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          artifact-name: sbom.cyclonedx.json
          upload-artifact: true
          upload-release-assets: false
          dependency-snapshot: false

  gh-release:
    runs-on: ubuntu-latest
    needs:
      - verify-tag
      - build-and-push
      - sbom
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Download SBOM
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: sbom.cyclonedx.json
          path: .

      - name: Extract release notes
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          if [ -z "$version" ]; then
            echo "RELEASE_TAG is required" >&2
            exit 1
          fi
          node scripts/ci-policy.mjs release-extract-notes \
            --changelog CHANGELOG.md \
            --version "$version" > release-notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          fi
          gh release upload "$GITHUB_REF_NAME" sbom.cyclonedx.json --clobber
