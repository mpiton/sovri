name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24"

      - name: Verify release tag
        run: >-
          node scripts/ci-policy.mjs release-verify-tag
          --tag "${GITHUB_REF_NAME}"
          --package-files
          "packages/core/package.json,packages/review-engine/package.json,packages/llm-providers/package.json,packages/config/package.json,packages/observability/package.json,packages/compliance/package.json,packages/brand/package.json,apps/community-bot/package.json"
          --changelog CHANGELOG.md

  build-and-push:
    runs-on: ubuntu-latest
    needs: verify-tag
    permissions:
      contents: read
      packages: write
      # id-token: write mints the ephemeral GitHub OIDC token that drives keyless cosign signing.
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: image-tags
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          minor="${RELEASE_TAG%.*}"
          major="${RELEASE_TAG%%.*}"
          {
            echo "full=${RELEASE_TAG}"
            echo "minor=${minor}"
            echo "major=${major}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Community bot image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/mpiton/sovri/community-bot:${{ steps.image-tags.outputs.full }}
            ghcr.io/mpiton/sovri/community-bot:${{ steps.image-tags.outputs.minor }}
            ghcr.io/mpiton/sovri/community-bot:${{ steps.image-tags.outputs.major }}
            ghcr.io/mpiton/sovri/community-bot:latest
          labels: org.opencontainers.image.source=https://github.com/mpiton/sovri

      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da

      # Sign the multi-arch manifest BY DIGEST with cosign keyless (Sigstore + GitHub OIDC): no private
      # key, only the ephemeral id-token. The signature lands in the Rekor transparency log. Self-hosters
      # verify the image before deploy with the command below — cert identity is THIS workflow, issuer is
      # GitHub Actions OIDC. Copy it verbatim into the self-host guide (task-134):
      #   cosign verify ghcr.io/mpiton/sovri/community-bot@sha256:<digest> \
      #     --certificate-identity-regexp "^https://github.com/mpiton/sovri/.github/workflows/release.yml@.*" \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
      - name: Sign image (keyless)
        run: cosign sign --yes ghcr.io/mpiton/sovri/community-bot@${{ steps.build.outputs.digest }}

  sbom:
    runs-on: ubuntu-latest
    needs: verify-tag
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          artifact-name: sbom.cyclonedx.json
          upload-artifact: true
          upload-release-assets: false
          dependency-snapshot: false

  gh-release:
    runs-on: ubuntu-latest
    needs:
      - verify-tag
      - build-and-push
      - sbom
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Download SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: sbom.cyclonedx.json
          path: .

      - name: Extract release notes
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          if [ -z "$version" ]; then
            echo "RELEASE_TAG is required" >&2
            exit 1
          fi
          node scripts/ci-policy.mjs release-extract-notes \
            --changelog CHANGELOG.md \
            --version "$version" \
            --max-bytes 100000 \
            --repo-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" > release-notes.md

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          fi
          gh release upload "$GITHUB_REF_NAME" sbom.cyclonedx.json --clobber
