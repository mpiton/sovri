name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"

      - name: Verify release tag
        run: >-
          node scripts/ci-policy.mjs release-verify-tag
          --tag "${GITHUB_REF_NAME}"
          --package-files
          "packages/core/package.json,packages/review-engine/package.json,packages/llm-providers/package.json,packages/config/package.json,packages/observability/package.json,apps/community-bot/package.json"
          --changelog CHANGELOG.md

  build-and-push:
    runs-on: ubuntu-latest
    needs: verify-tag
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Community bot image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/mpiton/sovri/community-bot:v0.1.0
            ghcr.io/mpiton/sovri/community-bot:v0.1
            ghcr.io/mpiton/sovri/community-bot:v0
            ghcr.io/mpiton/sovri/community-bot:latest
          labels: org.opencontainers.image.source=ghcr.io/mpiton/sovri/community-bot

  sbom:
    runs-on: ubuntu-latest
    needs: verify-tag
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json
          artifact-name: sbom.cyclonedx.json
          upload-artifact: true
          upload-release-assets: false
          dependency-snapshot: false

  gh-release:
    runs-on: ubuntu-latest
    needs:
      - verify-tag
      - build-and-push
      - sbom
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Download SBOM
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: sbom.cyclonedx.json
          path: .

      - name: Extract release notes
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          node --input-type=module <<'JS'
          import { readFileSync, writeFileSync } from "node:fs";

          const version = process.env.RELEASE_TAG?.replace(/^v/, "");
          if (version === undefined || version.length === 0) {
            throw new Error("RELEASE_TAG is required");
          }

          const changelog = readFileSync("CHANGELOG.md", "utf8");
          const heading = `## [${version}]`;
          const start = changelog.indexOf(heading);
          if (start === -1) {
            throw new Error(`Missing changelog section ${heading}`);
          }

          const bodyStart = start + heading.length;
          const nextHeading = changelog.slice(bodyStart).match(/\n## \[[^\]]+\]/);
          const bodyEnd =
            nextHeading?.index === undefined ? changelog.length : bodyStart + nextHeading.index;
          const notes = changelog.slice(bodyStart, bodyEnd).trim();
          writeFileSync("release-notes.md", `${notes}\n`);
          JS

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          fi
          gh release upload "$GITHUB_REF_NAME" sbom.cyclonedx.json --clobber
