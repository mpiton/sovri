name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-checks:
    name: TS — oxlint + oxfmt + tsc + vitest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
          # Docs tests diff the PR against its base; keep enough history without fetching the full repo.
          fetch-depth: 100

      - name: Fetch PR base history
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          auth_header="$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 | tr -d '\n')"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            fetch --no-tags --depth=100 origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"

      - name: Enable pnpm for setup-node cache
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: pnpm exec oxlint . --max-warnings=0 --no-error-on-unmatched-pattern

      - name: Format check
        run: pnpm exec oxfmt --check .

      - name: Build
        run: pnpm turbo build

      - name: Typecheck
        run: pnpm exec tsc -b

      - name: Test with coverage
        run: pnpm exec vitest run --coverage --reporter=verbose

      - name: Coverage gate — packages/llm-providers ≥ 85 %
        run: node scripts/check-coverage.mjs coverage/coverage-summary.json packages/llm-providers 85

      - name: Coverage gate — packages/compliance ≥ 90 %
        run: node scripts/check-coverage.mjs coverage/coverage-summary.json packages/compliance 90

      - name: Coverage gate — packages/review-engine ≥ 85 %
        run: node scripts/check-coverage.mjs coverage/coverage-summary.json packages/review-engine 85

      - name: Upload TypeScript coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ts-coverage
          path: coverage/
          retention-days: 90

  forbidden-tools:
    name: Forbidden tools
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Reject forbidden tools and TypeScript escape hatches
        run: ./scripts/no-forbidden-tools.sh --all

  forbidden-imports:
    name: Forbidden imports
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Reject Cloud imports from public surface
        run: ./scripts/check-boundary.sh --all

  header-lint:
    name: License headers
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Reject missing or wrong license headers
        run: node scripts/check-headers.mjs --all
