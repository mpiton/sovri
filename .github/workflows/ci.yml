name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-checks:
    name: TS — oxlint + oxfmt + tsc + vitest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Enable pnpm for setup-node cache
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: pnpm exec oxlint . --max-warnings=0 --no-error-on-unmatched-pattern

      - name: Format check
        run: pnpm exec oxfmt --check .

      - name: Build
        run: pnpm turbo build

      - name: Typecheck
        run: pnpm exec tsc -b

      - name: Test with coverage
        run: pnpm exec vitest run --coverage --reporter=verbose

      - name: Coverage gate — packages/llm-providers ≥ 85 %
        run: node scripts/check-coverage.mjs coverage/coverage-summary.json packages/llm-providers 85

      - name: Coverage gate — packages/compliance ≥ 90 %
        run: node scripts/check-coverage.mjs coverage/coverage-summary.json packages/compliance 90

      - name: Coverage gate — packages/review-engine ≥ 85 %
        run: node scripts/check-coverage.mjs coverage/coverage-summary.json packages/review-engine 85

      - name: Upload TypeScript coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ts-coverage
          path: coverage/
          retention-days: 90

  forbidden-tools:
    name: Forbidden tools
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Reject forbidden tools and TypeScript escape hatches
        run: ./scripts/no-forbidden-tools.sh --all

  forbidden-imports:
    name: Forbidden imports
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version-file: .nvmrc

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Reject Cloud imports from public surface
        run: ./scripts/check-boundary.sh --all
